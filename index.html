<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eFootball Squad Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <style>
        [v-cloak] { display: none !important; }

        /* System font stack instead of a remote Google Fonts import, which won't load in this sandbox */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-modal { background: rgba(15, 23, 42, 0.95); }

        .pitch-bg {
            background: linear-gradient(0deg, rgba(15,23,42,0.85) 0%, rgba(15,23,42,0.4) 100%), url('https://images.unsplash.com/photo-1518605368461-1e128224b456?q=80&w=2070&auto=format&fit=crop') center/cover;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .card-epic { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .card-showtime { background: linear-gradient(135deg, #ec4899 0%, #9333ea 100%); color: #fff; }
        .card-bigtime { background: linear-gradient(135deg, #34d399 0%, #059669 100%); color: #fff; }
        .card-highlight { background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%); color: #fff; }
        .card-base { background: linear-gradient(135deg, #94a3b8 0%, #475569 100%); color: #fff; }

        .player-node { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .player-node:active { transform: scale(0.95); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #818cf8;
            border-radius: 50%;
            width: 32px; height: 32px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-[#0f172a] text-slate-100 pb-24 md:pb-0 md:pt-20 min-h-screen">

    <div id="app" class="min-h-screen text-slate-100" v-cloak>

        <div v-if="isLoading" class="fixed inset-0 flex flex-col items-center justify-center bg-[#0f172a] z-[200]">
            <div class="spinner mb-4"></div>
            <div class="text-xs font-bold text-slate-300 uppercase tracking-wider">Loading your squad...</div>
        </div>

        <template v-else>
        <nav class="fixed md:top-0 bottom-0 left-0 w-full z-[40] glass-panel border-t md:border-t-0 md:border-b border-slate-700 bg-slate-900/90 text-white">
            <div class="max-w-4xl mx-auto px-4">
                <div class="flex justify-between md:justify-start md:space-x-8 items-center h-16">
                    <div class="hidden md:flex items-center text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mr-8">
                        <i class="fa-solid fa-futbol mr-2 text-indigo-400"></i> eF Tracker
                    </div>

                    <button @click="currentTab = 'squad'" :class="currentTab === 'squad' ? 'text-indigo-400' : 'text-slate-400'" class="flex-1 md:flex-none flex flex-col md:flex-row items-center justify-center py-2 transition-colors">
                        <i class="fa-solid fa-users text-lg md:mr-2 mb-1 md:mb-0"></i>
                        <span class="text-[10px] md:text-sm font-bold uppercase tracking-wider">Squad</span>
                    </button>
                    <button @click="currentTab = 'match'" :class="currentTab === 'match' ? 'text-indigo-400' : 'text-slate-400'" class="flex-1 md:flex-none flex flex-col md:flex-row items-center justify-center py-2 transition-colors">
                        <i class="fa-solid fa-stopwatch text-lg md:mr-2 mb-1 md:mb-0"></i>
                        <span class="text-[10px] md:text-sm font-bold uppercase tracking-wider">Play</span>
                    </button>
                    <button @click="initCharts(); currentTab = 'stats'" :class="currentTab === 'stats' ? 'text-indigo-400' : 'text-slate-400'" class="flex-1 md:flex-none flex flex-col md:flex-row items-center justify-center py-2 transition-colors">
                        <i class="fa-solid fa-chart-simple text-lg md:mr-2 mb-1 md:mb-0"></i>
                        <span class="text-[10px] md:text-sm font-bold uppercase tracking-wider">Stats</span>
                    </button>
                    <button @click="currentTab = 'sync'" :class="currentTab === 'sync' ? 'text-indigo-400' : 'text-slate-400'" class="flex-1 md:flex-none flex flex-col md:flex-row items-center justify-center py-2 transition-colors">
                        <i class="fa-solid fa-cloud text-lg md:mr-2 mb-1 md:mb-0"></i>
                        <span class="text-[10px] md:text-sm font-bold uppercase tracking-wider">Sync</span>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4 space-y-6">

            <div v-if="currentTab === 'squad'" class="space-y-4 animate-[fadeIn_0.3s_ease-out]">

                <div class="glass-panel rounded-2xl p-4 flex flex-wrap gap-3 items-center justify-between">
                    <div class="flex items-center space-x-2 w-full sm:w-auto">
                        <select v-model="activeSquadId" @change="onSquadSwitch" class="bg-slate-800 border border-slate-600 text-white font-bold rounded-lg px-3 py-2 outline-none focus:border-indigo-500 flex-1 sm:flex-none">
                            <option v-for="sq in squads" :key="sq.id" :value="sq.id">{{ sq.name }}</option>
                        </select>
                        <button @click="openSquadManager" class="bg-indigo-600 hover:bg-indigo-500 text-white w-10 h-10 rounded-lg shadow-lg flex items-center justify-center transition">
                            <i class="fa-solid fa-gear"></i>
                        </button>
                    </div>

                    <div class="flex items-center space-x-2 w-full sm:w-auto mt-2 sm:mt-0">
                        <select v-model="selectedTeamPlaystyle" @change="saveState" class="bg-slate-800 border border-slate-600 text-xs font-bold text-slate-100 rounded-lg px-3 py-2 outline-none flex-1">
                            <option value="Quick Counter">Quick Counter</option>
                            <option value="Possession Game">Possession Game</option>
                            <option value="Long Ball Counter">Long Ball Counter</option>
                            <option value="Out Wide">Out Wide</option>
                            <option value="Long Ball">Long Ball</option>
                        </select>
                        <select v-model="selectedFormation" @change="saveState" class="bg-slate-800 border border-slate-600 text-xs font-bold text-slate-100 rounded-lg px-3 py-2 outline-none flex-1">
                            <option value="4-3-3">4-3-3</option>
                            <option value="4-2-1-3">4-2-1-3</option>
                            <option value="4-4-2">4-4-2</option>
                            <option value="4-2-2-2">4-2-2-2</option>
                            <option value="4-3-1-2">4-3-1-2</option>
                            <option value="4-1-2-3">4-1-2-3</option>
                            <option value="3-2-4-1">3-2-4-1</option>
                            <option value="5-3-2">5-3-2</option>
                        </select>
                    </div>
                </div>

                <div class="pitch-bg rounded-3xl relative overflow-hidden shadow-2xl" style="padding-bottom: 130%;">
                    <div class="absolute inset-0 opacity-30 pointer-events-none">
                        <div class="absolute top-1/2 left-0 w-full h-[2px] bg-white transform -translate-y-1/2"></div>
                        <div class="absolute top-1/2 left-1/2 w-24 h-24 border-2 border-white rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
                        <div class="absolute top-0 left-1/2 w-40 h-32 border-2 border-white transform -translate-x-1/2"></div>
                        <div class="absolute bottom-0 left-1/2 w-40 h-32 border-2 border-white transform -translate-x-1/2"></div>
                    </div>

                    <div v-for="(playerId, index) in activeSquadStarters" :key="'start'+index"
                         @click="openSlotSwapModal('starter', index)"
                         class="player-node absolute w-14 h-16 sm:w-16 sm:h-20 transform -translate-x-1/2 -translate-y-1/2 cursor-pointer group flex flex-col items-center justify-center"
                         :style="getPositionStyle(index)">

                        <div :class="['w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center border-2 shadow-lg mb-1 relative overflow-hidden z-10 text-white', getCardClass(getPlayer(playerId).cardType)]">
                            <span class="text-[10px] sm:text-xs font-black">{{ getPlayer(playerId).pos }}</span>
                        </div>
                        <div class="bg-black/80 backdrop-blur text-white text-[9px] sm:text-[10px] font-bold px-1.5 py-0.5 rounded truncate w-16 text-center border border-slate-700/50 z-20">
                            {{ getPlayer(playerId).name || 'Unnamed Player' }}
                        </div>
                    </div>
                </div>

                <div class="glass-panel rounded-2xl p-4">
                    <h3 class="text-xs font-black text-slate-300 uppercase tracking-wider mb-3">Substitutes (12)</h3>
                    <div class="grid grid-cols-4 sm:grid-cols-6 gap-2">
                        <div v-for="(playerId, index) in activeSquadSubs" :key="'sub'+index"
                             @click="openSlotSwapModal('sub', index)"
                             class="bg-slate-800/50 hover:bg-slate-700 border border-slate-700/50 rounded-xl p-2 flex flex-col items-center cursor-pointer transition">
                            <div :class="['w-8 h-8 rounded-full flex items-center justify-center text-[9px] font-black mb-1 shadow text-white', getCardClass(getPlayer(playerId).cardType)]">
                                {{ getPlayer(playerId).pos }}
                            </div>
                            <div class="text-[9px] text-center text-slate-200 font-bold truncate w-full">
                                {{ getPlayer(playerId).name || 'Unnamed Player' }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'match'" class="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                <div class="glass-panel rounded-2xl p-4 sm:p-6 shadow-xl">
                    <h2 class="text-xl font-black mb-4 flex items-center text-white"><i class="fa-solid fa-pen-to-square text-indigo-400 mr-2"></i> Log Match</h2>

                    <div class="flex space-x-2 mb-6 bg-slate-800/50 p-1 rounded-xl">
                        <button @click="matchForm.matchType = 'Division'" :class="matchForm.matchType === 'Division' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white'" class="flex-1 py-2 rounded-lg text-xs font-bold transition">Division</button>
                        <button @click="matchForm.matchType = 'Event'" :class="matchForm.matchType === 'Event' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white'" class="flex-1 py-2 rounded-lg text-xs font-bold transition">Event</button>
                        <button @click="matchForm.matchType = 'Friend Match'" :class="matchForm.matchType === 'Friend Match' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white'" class="flex-1 py-2 rounded-lg text-xs font-bold transition">Friendly</button>
                    </div>

                    <div class="flex items-center justify-between mb-8 bg-slate-900/50 rounded-2xl p-4 border border-slate-800">
                        <div class="text-center">
                            <div class="text-[10px] text-slate-300 font-bold uppercase mb-2">My Team</div>
                            <div class="flex items-center space-x-3">
                                <button @click="matchForm.goalsFor > 0 ? matchForm.goalsFor-- : null" class="w-8 h-8 rounded-full bg-slate-700 hover:bg-slate-600 text-white font-bold">-</button>
                                <span class="text-3xl font-black text-indigo-400 w-8">{{ matchForm.goalsFor }}</span>
                                <button @click="matchForm.goalsFor++" class="w-8 h-8 rounded-full bg-slate-700 hover:bg-slate-600 text-white font-bold">+</button>
                            </div>
                        </div>
                        <div class="text-2xl font-black text-white">VS</div>
                        <div class="text-center">
                            <div class="text-[10px] text-slate-300 font-bold uppercase mb-2">Opponent</div>
                            <div class="flex items-center space-x-3">
                                <button @click="matchForm.goalsAgainst > 0 ? matchForm.goalsAgainst-- : null" class="w-8 h-8 rounded-full bg-slate-700 hover:bg-slate-600 text-white font-bold">-</button>
                                <span class="text-3xl font-black text-rose-400 w-8">{{ matchForm.goalsAgainst }}</span>
                                <button @click="matchForm.goalsAgainst++" class="w-8 h-8 rounded-full bg-slate-700 hover:bg-slate-600 text-white font-bold">+</button>
                            </div>
                        </div>
                    </div>

                    <div v-if="matchForm.ratings" class="space-y-6">
                        <div>
                            <h3 class="text-xs font-black text-slate-300 uppercase tracking-wider mb-3 border-b border-slate-800 pb-2">Starting XI Ratings</h3>
                            <div class="space-y-3">
                                <template v-for="playerId in activeSquadStarters" :key="'mr_start_'+playerId">
                                    <div v-if="matchForm.ratings[playerId]" class="bg-slate-800/40 border border-slate-700/50 rounded-xl p-3 flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                                        <div class="flex items-center justify-between w-full sm:w-1/3">
                                            <div class="flex items-center">
                                                <div :class="['w-6 h-6 rounded flex items-center justify-center text-[8px] font-black mr-2 text-white', getCardClass(getPlayer(playerId).cardType)]">{{ getPlayer(playerId).pos }}</div>
                                                <div class="text-sm font-bold text-white truncate max-w-[100px]">{{ getPlayer(playerId).name || 'Unnamed Player' }}</div>
                                            </div>
                                            <button @click="toggleMOTM(playerId)" :class="matchForm.ratings[playerId].motm ? 'text-yellow-400 scale-110 drop-shadow-md' : 'text-slate-500'" class="transition transform active:scale-95 px-2">
                                                <i class="fa-solid fa-star text-lg"></i>
                                            </button>
                                        </div>

                                        <div class="flex items-center space-x-2 w-full sm:w-2/3">
                                            <input type="range" min="3.0" max="9.0" step="0.5" v-model="matchForm.ratings[playerId].rating" class="flex-1 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                                            <span :class="['w-10 text-center text-xs font-black rounded px-1.5 py-1', getRatingColorClass(matchForm.ratings[playerId].rating)]">
                                                {{ parseFloat(matchForm.ratings[playerId].rating).toFixed(1) }}
                                            </span>

                                            <div v-if="!['GK','CB'].includes(getPlayer(playerId).pos)" class="flex items-center bg-slate-900 rounded-lg p-1 space-x-1 shrink-0 text-white">
                                                <i class="fa-solid fa-futbol text-[10px] text-slate-400 ml-1"></i>
                                                <button @click="matchForm.ratings[playerId].goals > 0 ? matchForm.ratings[playerId].goals-- : null" class="w-5 h-5 bg-slate-700 rounded text-xs leading-none">-</button>
                                                <span class="text-xs font-bold w-3 text-center">{{ matchForm.ratings[playerId].goals }}</span>
                                                <button @click="matchForm.ratings[playerId].goals++" class="w-5 h-5 bg-slate-700 rounded text-xs leading-none">+</button>
                                            </div>

                                            <div v-if="!['GK'].includes(getPlayer(playerId).pos)" class="flex items-center bg-slate-900 rounded-lg p-1 space-x-1 shrink-0 text-white">
                                                <i class="fa-solid fa-handshake text-[10px] text-slate-400 ml-1"></i>
                                                <button @click="matchForm.ratings[playerId].assists > 0 ? matchForm.ratings[playerId].assists-- : null" class="w-5 h-5 bg-slate-700 rounded text-xs leading-none">-</button>
                                                <span class="text-xs font-bold w-3 text-center">{{ matchForm.ratings[playerId].assists }}</span>
                                                <button @click="matchForm.ratings[playerId].assists++" class="w-5 h-5 bg-slate-700 rounded text-xs leading-none">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-xs font-black text-slate-300 uppercase tracking-wider mb-3 border-b border-slate-800 pb-2">Substitutes Used</h3>
                            <div class="space-y-3">
                                <template v-for="playerId in activeSquadSubs" :key="'mr_sub_'+playerId">
                                    <div v-if="matchForm.ratings[playerId]" class="bg-slate-800/30 border border-slate-700/30 rounded-xl p-3 flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                                        <div class="flex items-center space-x-3 w-full sm:w-1/3">
                                            <label class="relative inline-flex items-center cursor-pointer">
                                                <input type="checkbox" v-model="matchForm.ratings[playerId].played" class="sr-only peer">
                                                <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-500"></div>
                                            </label>
                                            <div class="text-xs font-bold text-slate-200 truncate">{{ getPlayer(playerId).name || 'Unnamed Player' }}</div>
                                        </div>

                                        <div v-if="matchForm.ratings[playerId].played" class="flex items-center space-x-2 w-full sm:w-2/3 animate-[fadeIn_0.2s_ease-out]">
                                            <input type="range" min="3.0" max="9.0" step="0.5" v-model="matchForm.ratings[playerId].rating" class="flex-1 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                                            <span :class="['w-10 text-center text-xs font-black rounded px-1.5 py-1', getRatingColorClass(matchForm.ratings[playerId].rating)]">
                                                {{ parseFloat(matchForm.ratings[playerId].rating).toFixed(1) }}
                                            </span>

                                            <div v-if="!['GK','CB'].includes(getPlayer(playerId).pos)" class="flex items-center bg-slate-900 rounded-lg p-1 space-x-1 shrink-0 text-white">
                                                <i class="fa-solid fa-futbol text-[10px] text-slate-400 ml-1"></i>
                                                <button @click="matchForm.ratings[playerId].goals > 0 ? matchForm.ratings[playerId].goals-- : null" class="w-5 h-5 bg-slate-700 rounded text-xs leading-none">-</button>
                                                <span class="text-xs font-bold w-3 text-center">{{ matchForm.ratings[playerId].goals }}</span>
                                                <button @click="matchForm.ratings[playerId].goals++" class="w-5 h-5 bg-slate-700 rounded text-xs leading-none">+</button>
                                            </div>

                                            <div v-if="!['GK'].includes(getPlayer(playerId).pos)" class="flex items-center bg-slate-900 rounded-lg p-1 space-x-1 shrink-0 text-white">
                                                <i class="fa-solid fa-handshake text-[10px] text-slate-400 ml-1"></i>
                                                <button @click="matchForm.ratings[playerId].assists > 0 ? matchForm.ratings[playerId].assists-- : null" class="w-5 h-5 bg-slate-700 rounded text-xs leading-none">-</button>
                                                <span class="text-xs font-bold w-3 text-center">{{ matchForm.ratings[playerId].assists }}</span>
                                                <button @click="matchForm.ratings[playerId].assists++" class="w-5 h-5 bg-slate-700 rounded text-xs leading-none">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <button @click="saveMatch" class="w-full mt-6 py-4 bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 text-white font-black rounded-xl shadow-lg shadow-indigo-500/30 transition transform active:scale-[0.98]">
                        SAVE MATCH DATA
                    </button>
                </div>
            </div>

            <div v-if="currentTab === 'stats'" class="space-y-6 pb-10 animate-[fadeIn_0.3s_ease-out]">

                <div class="glass-panel rounded-2xl p-4 sm:p-6 shadow-xl">
                    <h3 class="text-sm font-black text-white mb-4"><i class="fa-solid fa-radar text-indigo-400 mr-2"></i> Player Comparison</h3>
                    <div class="flex space-x-2 mb-4">
                        <select v-model="radarPlayer1" @change="updateRadarChart" class="flex-1 bg-slate-800 border border-indigo-500/50 text-xs text-white rounded-lg p-2 outline-none">
                            <option value="">Select Player 1...</option>
                            <option v-for="p in sortedRegistry" :key="'r1'+p.id" :value="p.id">{{ p.name || 'Unnamed Player' }}</option>
                        </select>
                        <select v-model="radarPlayer2" @change="updateRadarChart" class="flex-1 bg-slate-800 border border-emerald-500/50 text-xs text-white rounded-lg p-2 outline-none">
                            <option value="">Select Player 2...</option>
                            <option v-for="p in sortedRegistry" :key="'r2'+p.id" :value="p.id">{{ p.name || 'Unnamed Player' }}</option>
                        </select>
                    </div>
                    <div class="w-full max-w-sm mx-auto aspect-square relative">
                        <canvas id="playerRadarChart"></canvas>
                    </div>
                </div>

                <div class="glass-panel rounded-2xl p-4 sm:p-6 shadow-xl overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-black text-white"><i class="fa-solid fa-address-book text-indigo-400 mr-2"></i> Master Registry</h3>
                        <button @click="openSlotSwapModal('new', -1)" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-xs font-bold text-white rounded-lg shadow transition">+ Register</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs whitespace-nowrap">
                            <thead class="text-slate-300 border-b border-slate-700">
                                <tr>
                                    <th class="pb-2 font-bold uppercase">Player</th>
                                    <th class="pb-2 font-bold uppercase text-center">GP</th>
                                    <th class="pb-2 font-bold uppercase text-center"><i class="fa-solid fa-futbol text-slate-100"></i></th>
                                    <th class="pb-2 font-bold uppercase text-center"><i class="fa-solid fa-handshake text-slate-100"></i></th>
                                    <th class="pb-2 font-bold uppercase text-center"><i class="fa-solid fa-star text-yellow-500"></i></th>
                                    <th class="pb-2 font-bold uppercase text-center">Avg</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-800/50 text-white">
                                <tr v-for="player in sortedRegistry" :key="player.id" @click="editPlayerFromRegistry(player.id)" class="hover:bg-slate-700/50 transition cursor-pointer">
                                    <td class="py-3 flex items-center">
                                        <div :class="['w-5 h-5 rounded flex items-center justify-center text-[7px] font-black mr-2 shadow text-white', getCardClass(player.cardType)]">{{ player.pos }}</div>
                                        <div class="font-bold text-white truncate max-w-[120px]">{{ player.name || 'Unnamed Player' }} <i class="fa-solid fa-pen text-[10px] text-slate-400 ml-2"></i></div>
                                    </td>
                                    <td class="py-3 text-center text-slate-200 font-bold">{{ player.matches }}</td>
                                    <td class="py-3 text-center text-slate-200">{{ player.goals }}</td>

                                    <option value="Creative Playmaker">Creative Playmaker</option><option value="Orchestrator">Orchestrator</option><option value="Box-to-Box">Box-to-Box</option>

                                    <option value="Offensive GK">Offensive GK</option><option value="Defensive GK">Defensive GK</option><option value="None">None</option>

            <div v-if="confirmDialog.show" class="fixed inset-0 z-[70] flex items-center justify-center p-4 glass-modal animate-[fadeIn_0.2s_ease-out]">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-xs shadow-2xl overflow-hidden p-5 text-center">
                    <div class="w-12 h-12 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center mx-auto mb-3">
                        <i class="fa-solid fa-triangle-exclamation text-xl"></i>

                    <h3 class="text-white font-black text-lg mb-2">{{ confirmDialog.title }}</h3>
                    <p class="text-xs text-slate-300 mb-5">{{ confirmDialog.message }}</p>
                    <div class="flex space-x-3">
                        <button @click="confirmDialog.show = false" class="flex-1 py-2 rounded-lg bg-slate-800 text-white text-xs font-bold hover:bg-slate-700 transition">Cancel</button>
                        <button @click="confirmDialog.onConfirm(); confirmDialog.show = false" class="flex-1 py-2 rounded-lg bg-rose-600 text-white text-xs font-bold hover:bg-rose-500 transition">Confirm</button>
                    </div>
                </div>
            </div>

            <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] transition-all duration-300 pointer-events-none" :class="notification.show ? 'translate-y-0 opacity-100' : '-translate-y-8 opacity-0'">
                <div class="bg-slate-800/90 backdrop-blur border border-indigo-500/50 text-white text-xs font-bold px-4 py-2 rounded-full shadow-2xl flex items-center">
                    <i class="fa-solid fa-circle-check text-indigo-400 mr-2"></i> {{ notification.message }}
                </div>
            </div>
        </template>

        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const currentTab = ref('squad');
                const isLoading = ref(true);
                const notification = ref({ show: false, message: '' });
                const confirmDialog = ref({ show: false, title: '', message: '', onConfirm: null });

                const formations = {
                    '4-3-3': [
                        {top: '15%', left: '50%'}, {top: '25%', left: '20%'}, {top: '25%', left: '80%'},
                        {top: '45%', left: '30%'}, {top: '45%', left: '70%'}, {top: '60%', left: '50%'},
                        {top: '75%', left: '15%'}, {top: '75%', left: '35%'}, {top: '75%', left: '65%'}, {top: '75%', left: '85%'},
                        {top: '90%', left: '50%'}
                    ],
                    '4-2-1-3': [
                        {top: '15%', left: '50%'}, {top: '25%', left: '20%'}, {top: '25%', left: '80%'},
                        {top: '40%', left: '50%'}, {top: '55%', left: '35%'}, {top: '55%', left: '65%'},
                        {top: '75%', left: '15%'}, {top: '75%', left: '35%'}, {top: '75%', left: '65%'}, {top: '75%', left: '85%'},
                        {top: '90%', left: '50%'}
                    ],
                    '4-4-2': [
                        {top: '15%', left: '35%'}, {top: '15%', left: '65%'},
                        {top: '45%', left: '15%'}, {top: '45%', left: '40%'}, {top: '45%', left: '60%'}, {top: '45%', left: '85%'},
                        {top: '75%', left: '15%'}, {top: '75%', left: '35%'}, {top: '75%', left: '65%'}, {top: '75%', left: '85%'},
                        {top: '90%', left: '50%'}
                    ],
                    '4-2-2-2': [
                        {top: '15%', left: '35%'}, {top: '15%', left: '65%'},
                        {top: '35%', left: '20%'}, {top: '35%', left: '80%'},
                        {top: '55%', left: '35%'}, {top: '55%', left: '65%'},
                        {top: '75%', left: '15%'}, {top: '75%', left: '35%'}, {top: '75%', left: '65%'}, {top: '75%', left: '85%'},
                        {top: '90%', left: '50%'}
                    ],
                    '4-3-1-2': [
                        {top: '15%', left: '35%'}, {top: '15%', left: '65%'},
                        {top: '35%', left: '50%'},
                        {top: '55%', left: '25%'}, {top: '60%', left: '50%'}, {top: '55%', left: '75%'},
                        {top: '75%', left: '15%'}, {top: '75%', left: '35%'}, {top: '75%', left: '65%'}, {top: '75%', left: '85%'},
                        {top: '90%', left: '50%'}
                    ],
                    '4-1-2-3': [
                        {top: '15%', left: '50%'}, {top: '25%', left: '20%'}, {top: '25%', left: '80%'},
                        {top: '40%', left: '35%'}, {top: '40%', left: '65%'},
                        {top: '60%', left: '50%'},
                        {top: '75%', left: '15%'}, {top: '75%', left: '35%'}, {top: '75%', left: '65%'}, {top: '75%', left: '85%'},
                        {top: '90%', left: '50%'}
                    ],
                    '3-2-4-1': [
                        {top: '15%', left: '50%'},
                        {top: '35%', left: '25%'}, {top: '35%', left: '75%'}, {top: '30%', left: '10%'}, {top: '30%', left: '90%'},
                        {top: '55%', left: '35%'}, {top: '55%', left: '65%'},
                        {top: '75%', left: '20%'}, {top: '75%', left: '50%'}, {top: '75%', left: '80%'},
                        {top: '90%', left: '50%'}
                    ],
                    '5-3-2': [
                        {top: '15%', left: '35%'}, {top: '15%', left: '65%'},
                        {top: '45%', left: '25%'}, {top: '45%', left: '50%'}, {top: '45%', left: '75%'},
                        {top: '65%', left: '10%'}, {top: '75%', left: '30%'}, {top: '75%', left: '50%'}, {top: '75%', left: '70%'}, {top: '65%', left: '90%'},
                        {top: '90%', left: '50%'}
                    ]
                };

                const createEmptyPlayer = (pos) => ({ id: 'p_' + Date.now() + Math.random().toString(36).substr(2, 9), name: '', pos, cardType: 'base', playstyle: 'None', matches: 0, goals: 0, assists: 0, totalRating: 0, motmAwards: 0 });

                const masterRegistry = ref([]);
                const squads = ref([]);
                const activeSquadId = ref('');
                const matchHistory = ref([]);
                const matchForm = ref({ matchType: 'Division', goalsFor: 0, goalsAgainst: 0, ratings: {} });

                const STORAGE_KEY = 'ef_tracker_data';

                const showNotif = (msg) => {
                    notification.value.message = msg;
                    notification.value.show = true;
                    setTimeout(() => { notification.value.show = false; }, 3000);
                };

                const customConfirm = (title, message, callback) => {
                    confirmDialog.value = { show: true, title, message, onConfirm: callback };
                };

                const buildDefaultSquad = () => {
                    const initialSquad = {
                        id: 'sq_initial', name: 'Main Squad', formation: '4-3-3', playstyle: 'Quick Counter', starters: [], subs: []
                    };
                    const defaultPos = ['CF','LWF','RWF','CMF','CMF','DMF','LB','CB','CB','RB','GK'];
                    for (let i = 0; i < 11; i++) {
                        const p = createEmptyPlayer(defaultPos[i]);
                        masterRegistry.value.push(p);
                        initialSquad.starters.push(p.id);
                    }
                    for (let i = 0; i < 12; i++) {
                        const p = createEmptyPlayer('CMF');
                        masterRegistry.value.push(p);
                        initialSquad.subs.push(p.id);
                    }
                    squads.value = [initialSquad];
                    activeSquadId.value = initialSquad.id;
                };

                // Claude artifacts can't use localStorage/sessionStorage, so persistence goes
                // through window.storage instead. Everything is kept under one key since it's
                // all read/written together.
                const loadState = async () => {
                    try {
                        const result = await window.storage.get(STORAGE_KEY);
                        if (result && result.value) {
                            const data = JSON.parse(result.value);
                            masterRegistry.value = data.registry || [];
                            squads.value = data.squads || [];
                            matchHistory.value = data.matches || [];
                            activeSquadId.value = squads.value[0]?.id || '';
                        }
                        if (!squads.value.length) {
                            buildDefaultSquad();
                        }
                    } catch (e) {
                        // No saved data yet, or storage unavailable — start fresh.
                        console.warn('No existing save found, starting a new squad.', e);
                        if (!squads.value.length) buildDefaultSquad();
                    }
                    initMatchForm();
                    isLoading.value = false;
                };

                const saveState = async () => {
                    try {
                        const payload = JSON.stringify({
                            registry: masterRegistry.value,
                            squads: squads.value,
                            matches: matchHistory.value
                        });
                        const result = await window.storage.set(STORAGE_KEY, payload);
                        if (!result) throw new Error('Storage returned no result');
                    } catch (e) {
                        console.error('Failed to save', e);
                        showNotif('Could not save — check your connection');
                    }
                };

                const activeSquad = computed(() => squads.value.find(s => s.id === activeSquadId.value) || squads.value[0]);
                const activeSquadStarters = computed(() => activeSquad.value?.starters || []);
                const activeSquadSubs = computed(() => activeSquad.value?.subs || []);

                const selectedFormation = computed({
                    get: () => activeSquad.value?.formation || '4-3-3',
                    set: (val) => { if(activeSquad.value) { activeSquad.value.formation = val; saveState(); } }
                });

                const selectedTeamPlaystyle = computed({
                    get: () => activeSquad.value?.playstyle || 'Quick Counter',
                    set: (val) => { if(activeSquad.value) { activeSquad.value.playstyle = val; saveState(); } }
                });

                const sortedRegistry = computed(() => [...masterRegistry.value].sort((a, b) => b.matches - a.matches || a.name.localeCompare(b.name)));

                // Fallback now includes numeric fields so the radar chart and rating
                // badges never divide by an undefined `matches` and produce NaN.
                const getPlayer = (id) => masterRegistry.value.find(p => p.id === id) || {
                    name: '', pos: '?', cardType: 'base', playstyle: 'None',
                    matches: 0, goals: 0, assists: 0, totalRating: 0, motmAwards: 0
                };

                const initMatchForm = () => {
                    if (!activeSquad.value) return;
                    const ratingsObj = {};
                    activeSquad.value.starters.forEach(id => {
                        ratingsObj[id] = { rating: 6.0, goals: 0, assists: 0, played: true, motm: false };
                    });
                    activeSquad.value.subs.forEach(id => {
                        ratingsObj[id] = { rating: 6.0, goals: 0, assists: 0, played: false, motm: false };
                    });
                    matchForm.value = { matchType: 'Division', goalsFor: 0, goalsAgainst: 0, ratings: ratingsObj };
                };

                const onSquadSwitch = () => {
                    initMatchForm();
                    saveState();
                };

                const toggleMOTM = (playerId) => {
                    for (const id in matchForm.value.ratings) {
                        if (id !== playerId) matchForm.value.ratings[id].motm = false;
                    }
                    matchForm.value.ratings[playerId].motm = !matchForm.value.ratings[playerId].motm;
                };

                const saveMatch = () => {
                    const matchId = 'm_' + Date.now();
                    const newMatch = {
                        id: matchId, date: new Date().toISOString(), squadId: activeSquadId.value, matchType: matchForm.value.matchType,
                        goalsFor: matchForm.value.goalsFor, goalsAgainst: matchForm.value.goalsAgainst,
                        ratings: JSON.parse(JSON.stringify(matchForm.value.ratings))
                    };

                    matchHistory.value.push(newMatch);

                    for (const playerId in matchForm.value.ratings) {
                        const data = matchForm.value.ratings[playerId];
                        if (data.played) {
                            const p = masterRegistry.value.find(player => player.id === playerId);
                            if (p) {
                                p.matches = (p.matches || 0) + 1;
                                p.goals = (p.goals || 0) + data.goals;
                                p.assists = (p.assists || 0) + data.assists;
                                p.totalRating = (p.totalRating || 0) + parseFloat(data.rating);
                                if (data.motm) p.motmAwards = (p.motmAwards || 0) + 1;
                            }
                        }
                    }
                    saveState();
                    initMatchForm();
                    if(currentTab.value === 'stats') initCharts();
                    showNotif('Match logged & stats updated!');
                };

                const showSquadManager = ref(false);
                const newSquadName = ref('');
                const openSquadManager = () => showSquadManager.value = true;

                const createNewSquad = () => {
                    if (!newSquadName.value.trim()) return showNotif('Enter a squad name!');
                    const newSquad = {
                        id: 'sq_' + Date.now(), name: newSquadName.value, formation: selectedFormation.value, playstyle: selectedTeamPlaystyle.value,
                        starters: [...(activeSquad.value.starters || [])], subs: [...(activeSquad.value.subs || [])]
                    };
                    squads.value.push(newSquad);
                    activeSquadId.value = newSquad.id;
                    newSquadName.value = '';
                    showSquadManager.value = false;
                    onSquadSwitch();
                    showNotif('Squad created successfully!');
                };

                const deleteSquad = (id) => {
                    if (squads.value.length <= 1) return showNotif('Cannot delete last squad');
                    customConfirm("Delete Squad?", "Are you sure you want to delete this squad setup?", () => {
                        squads.value = squads.value.filter(s => s.id !== id);
                        if (activeSquadId.value === id) { activeSquadId.value = squads.value[0].id; onSquadSwitch(); }
                        saveState();
                        showNotif('Squad deleted.');
                    });
                };

                const showSlotSwapModal = ref(false);
                const slotModalTab = ref('swap');
                const targetSlotType = ref('starter');
                const targetSlotIndex = ref(0);
                const playerSearchQuery = ref('');
                const editPlayerData = ref({});

                const filteredRegistry = computed(() => {
                    if (!playerSearchQuery.value) return masterRegistry.value;
                    return masterRegistry.value.filter(p => p.name.toLowerCase().includes(playerSearchQuery.value.toLowerCase()));
                });

                const openSlotSwapModal = (type, index) => {
                    targetSlotType.value = type;
                    targetSlotIndex.value = index;
                    playerSearchQuery.value = '';

                    let currentId = null;
                    if (type === 'starter') currentId = activeSquadStarters.value[index];
                    else if (type === 'sub') currentId = activeSquadSubs.value[index];

                    if (currentId) {
                        const p = getPlayer(currentId);
                        editPlayerData.value = JSON.parse(JSON.stringify(p));
                        slotModalTab.value = p.name ? 'swap' : 'edit';
                    } else {
                        editPlayerData.value = createEmptyPlayer('CF');
                        slotModalTab.value = 'edit';
                    }
                    showSlotSwapModal.value = true;
                };

                const assignPlayerToSlot = (playerId) => {
                    if (targetSlotType.value === 'starter') { activeSquad.value.starters[targetSlotIndex.value] = playerId; }
                    else if (targetSlotType.value === 'sub') { activeSquad.value.subs[targetSlotIndex.value] = playerId; }
                    initMatchForm(); saveState();
                    showSlotSwapModal.value = false;
                    showNotif('Player assigned to slot!');
                };

                const editPlayerFromRegistry = (playerId) => {
                    const p = getPlayer(playerId);
                    editPlayerData.value = JSON.parse(JSON.stringify(p));
                    slotModalTab.value = 'edit';
                    targetSlotType.value = 'registry';
                    showSlotSwapModal.value = true;
                };

                const savePlayerDetails = () => {
                    if (!editPlayerData.value.name.trim()) editPlayerData.value.name = 'Unnamed Player';
                    let existingIndex = masterRegistry.value.findIndex(p => p.id === editPlayerData.value.id);

                    if (existingIndex >= 0) { masterRegistry.value[existingIndex] = { ...masterRegistry.value[existingIndex], ...editPlayerData.value }; }
                    else { masterRegistry.value.push({ ...editPlayerData.value }); }

                    if (targetSlotType.value === 'starter' || targetSlotType.value === 'sub') {
                        assignPlayerToSlot(editPlayerData.value.id);
                    } else {
                        saveState();
                        showSlotSwapModal.value = false;
                        showNotif('Player saved successfully!');
                        if (currentTab.value === 'stats') updateRadarChart();
                    }
                };

                let radarChartInst = null;
                const radarPlayer1 = ref('');
                const radarPlayer2 = ref('');

                const updateRadarChart = () => {
                    if (!radarChartInst) return;
                    const p1 = getPlayer(radarPlayer1.value);
                    const p2 = getPlayer(radarPlayer2.value);

                    const calcStats = (p) => {
                        if (!p || !p.matches) return [0,0,0,0,0];
                        const avgRtg = (p.totalRating / p.matches);
                        const goalThreat = Math.min((p.goals / p.matches) * 10, 10);
                        const playmaking = Math.min((p.assists / p.matches) * 10, 10);
                        const motmFreq = Math.min((p.motmAwards / p.matches) * 10, 10);
                        const exp = Math.min(p.matches / 10, 10);
                        return [avgRtg, goalThreat, playmaking, motmFreq, exp];
                    };

                    radarChartInst.data.datasets[0].data = calcStats(p1);
                    radarChartInst.data.datasets[0].label = p1.name ? p1.name : 'Player 1';
                    radarChartInst.data.datasets[1].data = calcStats(p2);
                    radarChartInst.data.datasets[1].label = p2.name ? p2.name : 'Player 2';
                    radarChartInst.update();
                };

                const initCharts = () => {
                    nextTick(() => {
                        if (typeof Chart === 'undefined') return;
                        const ctx = document.getElementById('playerRadarChart');
                        if (!ctx) return;
                        if (radarChartInst) radarChartInst.destroy();

                        Chart.defaults.color = '#e2e8f0'; Chart.defaults.font.family = 'Inter';
                        radarChartInst = new Chart(ctx, {
                            type: 'radar',
                            data: {
                                labels: ['Avg Rating', 'Goal Threat', 'Playmaking', 'MOTM Freq', 'Experience'],
                                datasets: [
                                    { label: 'Player 1', data: [0,0,0,0,0], backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: 'rgba(99, 102, 241, 1)', pointBackgroundColor: 'rgba(99, 102, 241, 1)', borderWidth: 2 },
                                    { label: 'Player 2', data: [0,0,0,0,0], backgroundColor: 'rgba(16, 185, 129, 0.2)', borderColor: 'rgba(16, 185, 129, 1)', pointBackgroundColor: 'rgba(16, 185, 129, 1)', borderWidth: 2 }
                                ]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                scales: { r: { angleLines: { color: 'rgba(255, 255, 255, 0.2)' }, grid: { color: 'rgba(255, 255, 255, 0.2)' }, pointLabels: { color: '#f8fafc', font: { size: 10, weight: 'bold' } }, ticks: { display: false, min: 0, max: 10 } } },
                                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, color: '#f8fafc' } } }
                            }
                        });

                        if (sortedRegistry.value.length >= 2) {
                            radarPlayer1.value = sortedRegistry.value[0].id; radarPlayer2.value = sortedRegistry.value[1].id;
                            updateRadarChart();
                        }
                    });
                };

                const exportData = () => {
                    const data = { registry: masterRegistry.value, squads: squads.value, matches: matchHistory.value };
                    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `eFootball_Backup_${new Date().toISOString().split('T')[0]}.json`;
                    a.click();
                };

                const importData = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (data.registry && data.squads) {
                                masterRegistry.value = data.registry; squads.value = data.squads; matchHistory.value = data.matches || [];
                                activeSquadId.value = squads.value[0].id;
                                saveState(); onSquadSwitch(); showNotif('Data imported successfully!');
                            }
                        } catch (err) { showNotif('Invalid backup file!'); }
                    };
                    reader.readAsText(file);
                };

                const factoryReset = () => {
                    customConfirm("WARNING: Factory Reset", "This will permanently delete ALL players, squads, and match history. Proceed?", async () => {
                        try {
                            await window.storage.delete(STORAGE_KEY);
                        } catch (e) {
                            console.warn('Nothing to delete or delete failed', e);
                        }
                        location.reload();
                    });
                };

                const getPositionStyle = (index) => {
                    const formConfig = formations[selectedFormation.value] || formations['4-3-3'];
                    return formConfig[index] || { top: '50%', left: '50%' };
                };

                const getCardClass = (type) => 'card-' + (type || 'base');

                const getRatingColorClass = (rating) => {
                    const r = parseFloat(rating);
                    if (r >= 7.5) return 'bg-emerald-500/20 text-emerald-400';
                    if (r >= 6.5) return 'bg-indigo-500/20 text-indigo-400';
                    if (r >= 5.5) return 'bg-slate-500/20 text-slate-300';
                    return 'bg-rose-500/20 text-rose-400';
                };

                onMounted(() => { loadState(); });

                return {
                    currentTab, isLoading, notification, confirmDialog, getCardClass, getPositionStyle, getRatingColorClass, getPlayer,
                    squads, activeSquadId, activeSquad, activeSquadStarters, activeSquadSubs,
                    selectedFormation, selectedTeamPlaystyle, onSquadSwitch, saveState,
                    matchForm, matchHistory, saveMatch, toggleMOTM,
                    showSquadManager, newSquadName, openSquadManager, createNewSquad, deleteSquad,
                    showSlotSwapModal, slotModalTab, targetSlotType, targetSlotIndex, playerSearchQuery, editPlayerData, filteredRegistry, openSlotSwapModal, assignPlayerToSlot, editPlayerFromRegistry, savePlayerDetails,
                    masterRegistry, sortedRegistry, radarPlayer1, radarPlayer2, updateRadarChart, initCharts,
                    exportData, importData, factoryReset
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
