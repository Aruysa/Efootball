<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        [v-cloak] { display: none !important; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="text-white">

<div id="app" v-cloak class="min-h-screen">
    <nav class="fixed bottom-0 w-full bg-slate-900 border-t border-slate-700 p-4 flex justify-around z-50">
        <button @click="currentTab = 'squad'" class="flex flex-col items-center text-xs font-bold" :class="currentTab === 'squad' ? 'text-indigo-400' : 'text-slate-400'">
            <i class="fa-solid fa-users text-lg"></i> Squad
        </button>
        <button @click="currentTab = 'match'" class="flex flex-col items-center text-xs font-bold" :class="currentTab === 'match' ? 'text-indigo-400' : 'text-slate-400'">
            <i class="fa-solid fa-futbol text-lg"></i> Match
        </button>
        <button @click="currentTab = 'stats'" class="flex flex-col items-center text-xs font-bold" :class="currentTab === 'stats' ? 'text-indigo-400' : 'text-slate-400'">
            <i class="fa-solid fa-chart-simple text-lg"></i> Stats
        </button>
    </nav>

    <main class="max-w-2xl mx-auto p-4 pb-24">
        <div v-if="currentTab === 'squad'">
            <h1 class="text-2xl font-black mb-4">Your Squad</h1>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <p class="text-slate-300">Squad view active. (Players displayed here sync globally).</p>
            </div>
        </div>

        <div v-if="currentTab === 'match'">
            <h1 class="text-2xl font-black mb-4">Log Match</h1>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <p class="text-slate-300">Match logger active.</p>
            </div>
        </div>

        <div v-if="currentTab === 'stats'">
            <h1 class="text-2xl font-black mb-4">Master Registry</h1>
            <button @click="registerNewPlayer" class="bg-indigo-600 px-4 py-2 rounded-lg font-bold text-sm mb-4">+ Register New Player</button>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-white">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400 text-xs">
                            <th class="p-2">Player</th>
                            <th class="p-2">GP</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="p in masterRegistry" :key="p.id" class="border-b border-slate-800 text-sm">
                            <td class="p-2">{{ p.name || 'Unnamed Player' }}</td>
                            <td class="p-2">{{ p.matches }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const currentTab = ref('stats');
            const masterRegistry = ref([{ id: 1, name: 'Lionel Messi', matches: 10 }]);

            const registerNewPlayer = () => {
                masterRegistry.value.push({ id: Date.now(), name: 'New Player', matches: 0 });
            };

            return { currentTab, masterRegistry, registerNewPlayer };
        }
    }).mount('#app');
</script>
</body>
</html>
